name: Scrape Cloudflare Sites

on:
  workflow_dispatch:
  schedule:
    # 毎週月曜9時JST (日曜24:00 UTC)
    - cron: "0 0 * * 1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Install curl-impersonate
        run: |
          curl -sL https://github.com/lwthiker/curl-impersonate/releases/download/v0.6.1/curl-impersonate-v0.6.1.x86_64-linux-gnu.tar.gz -o /tmp/curl-impersonate.tar.gz
          sudo tar xzf /tmp/curl-impersonate.tar.gz -C /usr/local/bin/
          curl_chrome116 --version || echo "curl-impersonate installed"

      - name: Run Cloudflare sites scraper
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: xvfb-run npx tsx scripts/scrape-cf-sites.ts
